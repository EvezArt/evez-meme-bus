name: Meme Bus Heartbeat

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  bus-cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run bus heartbeat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: python bus/heartbeat.py
